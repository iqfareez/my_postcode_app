name: my_postcode_app
description: An app for searching Malaysia postcode.

publish_to: "none"

version: 1.1.3+5

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  drift_flutter: ^0.3.0
  drift: ^2.34.0
  fluttertoast: ^9.1.0
  gap: ^3.0.1
  path_provider: ^2.1.6
  url_launcher: ^6.0.18

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/Malaysia_Postcode.sqlite

  fonts:
    - family: Be Vietnam Pro
      fonts:
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-Thin.ttf
          weight: 100
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-ExtraLight.ttf
          weight: 200
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-Light.ttf
          weight: 300
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-LightItalic.ttf
          weight: 300
          style: italic
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-Regular.ttf
          weight: 400
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-Italic.ttf
          weight: 400
          style: italic
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-Medium.ttf
          weight: 500
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-SemiBold.ttf
          weight: 600
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-Bold.ttf
          weight: 700
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-ExtraBold.ttf
          weight: 800
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-Black.ttf
          weight: 900
        - asset: fonts/Be_Vietnam_Pro/BeVietnamPro-BlackItalic.ttf
          weight: 900
          style: italic
